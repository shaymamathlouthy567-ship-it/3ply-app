<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE STASH. Never bare.</title>
    <meta name="theme-color" content="#FCE7F3">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    
    <!-- Google Fonts: Rounded playful (Fredoka), thin script (Reenie Beanie) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Reenie+Beanie&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-wrapper">
        <div class="container floating-card">
            
            <div class="throne-room-illustration">
                <img src="tp-roll.png" alt="The Throne" class="final-photo">
                <div class="script-font illust-tag">Secure the drip!</div>
            </div>

            <header class="chunky-header">
                <div class="genz-tag script-font">#NOBROWNMARKS</div>
                <h1 class="playful-font">THE STASH.</h1>
                <p class="sans-serif-font">SECURE THE DRIP. NEVER BARE.</p>
            </header>

            <!-- Creative Date Slider -->
            <div class="input-group">
                <label class="playful-label">When was the haul?</label>
                <div class="slider-container">
                    <span id="dateDisplay" class="playful-font date-badge">TODAY</span>
                    <input type="range" id="purchaseSlider" min="0" max="14" value="0" class="custom-slider">
                </div>
            </div>

            <!-- Dashboard Dials -->
            <div class="dials-row">
                <div class="dial-wrapper">
                    <label class="playful-label">Rolls</label>
                    <div class="dial-container" id="dial-rolls">
                        <div class="dial-rotator"><div class="knob-dot"></div></div>
                        <div class="dial-value playful-font">12</div>
                    </div>
                </div>

                <div class="dial-wrapper">
                    <label class="playful-label">Survival (Days)</label>
                    <div class="dial-container" id="dial-days">
                        <div class="dial-rotator"><div class="knob-dot cobalt-dot"></div></div>
                        <div class="dial-value playful-font">4</div>
                    </div>
                </div>
            </div>

            <button id="setReminderBtn" class="playful-font rounded-btn">SECURE THE BAG</button>

            <!-- The ONE AND ONLY Tip Jar connected to your Patreon -->
            <a href="https://www.patreon.com/posts/secure-drip-one-157464242" class="tip-jar script-font" target="_blank">Buy me ply with you broh 🧻</a>
            
        </div>
    </div>

    <!-- iOS Install Prompt -->
    <div id="iosPrompt" class="ios-prompt sans-serif-font" style="display: none;">
        Tap the Share button <span>↑</span> below and select <strong>"Add to Home Screen"</strong> to install.
    </div>

    <script src="app.js"></script>
</body>
</html>
