<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Stash.</title>
    <meta name="theme-color" content="#93a284">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts: chunky block font, thin script font, and a clean sans-serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Reenie+Beanie&family=Rubik+Mono+One&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-wrapper">
        <div class="container">
            <header class="chunky-header">
                <div class="genz-tag script-font">#NOBROWNMARKS</div>
                <h1 class="chunky-font">THE STASH.</h1>
                <p class="subtitle sans-serif-font">SECURE THE DRIP, AVOID THE UNTHINKABLE.</p>
            </header>

            <div class="input-group">
                <label class="sans-serif-font">Last Haul Date</label>
                <input type="date" id="purchaseDate" required class="sans-serif-font">
            </div>

            <div class="input-group">
                <label class="sans-serif-font">Total Rolls (the drip count)</label>
                <input type="number" id="rollsCount" placeholder="e.g., 24" inputmode="numeric" required class="sans-serif-font">
            </div>

            <div class="input-group">
                <label class="sans-serif-font">Days 1 Roll Survives (the endurance trial)</label>
                <input type="number" id="daysPerRoll" placeholder="e.g., 4" inputmode="numeric" required class="sans-serif-font">
            </div>

            <button id="setReminderBtn" class="chunky-font">SECURE THE DRIP</button>

            <!-- Tip Jar -->
            <a href="YOUR_TIP_LINK_HERE" class="tip-jar script-font" target="_blank">Tip your dev so I don't use leaves ☕</a>
        </div>
    </div>

    <!-- iOS Install Prompt -->
    <div id="iosPrompt" class="ios-prompt sans-serif-font" style="display: none;">
        Tap the Share button <span>↑</span> below and select <strong>"Add to Home Screen"</strong> to install.
    </div>

    <script src="app.js"></script>
</body>
</html>
